<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="../style/style.css" />
  </head>
  <body>
    <header>
      <div id="header">
        <h1>Courses</h1>
        <br />
        <nav>
          <ul>
            <li>
              <a href="https://marohuh.github.io/IT20250681/home">Home</a>
            </li>
            <li>
              <a href="https://marohuh.github.io/IT20250681/my_courses"
                >My Courses</a
              >
            </li>
            <li>
              <a href="https://marohuh.github.io/IT20250681/add_courses"
                >Add Course</a
              >
            </li>
            <li>
              <a href="https://marohuh.github.io/IT20250681/contact"
                >Contact Us</a
              >
            </li>
          </ul>
        </nav>
      </div>
      <div class="background">Add Courses</div>
    </header>
    <main>
      <section class="courses">
        <h1>Add a Course</h1>
        <p>Fill in the details below to register a new course.</p>
        <div class="form">
          <form
            method="POST"
            action="https://marohuh.github.io/IT20250681-Add-Courses/"
          >
            <div class="form-group">
              <label for="courseName">Course Name *</label>
              <input
                type="text"
                id="courseName"
                name="courseName"
                placeholder="e.g. Introduction to Computer Science"
                required
              />
            </div>

            <div class="form-group">
              <label for="instructor">Instructor Name *</label>
              <input
                type="text"
                id="instructor"
                name="instructor"
                placeholder="e.g. Dr. Sarah Mitchell"
                required
              />
            </div>

            <div class="form-group">
              <label for="creditHours">Credit Hours *</label>
              <select id="creditHours" name="creditHours" required>
                <option value="" disabled selected>Select credit hours</option>
                <option value="1">1 Credit Hour</option>
                <option value="2">2 Credit Hours</option>
                <option value="3">3 Credit Hours</option>
                <option value="4">4 Credit Hours</option>
                <option value="5">5 Credit Hours</option>
                <option value="6">6 Credit Hours</option>
              </select>
            </div>
            <div class="form-group full">
              <label for="notes">Notes</label>
              <textarea
                id="notes"
                name="notes"
                placeholder="Add any personal notes, reminders, or important dates for this course…"
              ></textarea>
            </div>
            <div class="form-submit">
              <input
                class="submit-button"
                type="submit"
                value="Register Course"
              />
            </div>
          </form>
        </div>
      </section>
    </main>
    <footer>
      <p>© 2025 Omar Tarek 20250681</p>
    </footer>
  </body>
</html>
